name: Pipeline CI
on: [push]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installation de flake8
        run: pip install flake8
      - name: Analyse du style (PEP8)
        run: flake8 appli.py --max-line-length=127

  tests:
    runs-on: ubuntu-latest
    needs: linting # <--- Bloque les tests si le code est sale !
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installation de pytest
        run: pip install pytest
      - name: Exécution des tests unitaires
        run: pytest test_calculatrice.py