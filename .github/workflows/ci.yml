name: Pipeline CI
on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installation de pytest
        run: pip install pytest
      - name: Exécution des tests unitaires
        run: pytest test_calculatrice.py